name: islamiapp
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_svg: ^2.1.0

  vector_graphics: any
  carousel_slider: ^5.1.1
  introduction_screen: ^4.0.0
  flutter_bloc: ^9.1.1
  skeletonizer: ^2.1.3
  dio: ^5.9.2
  dartz: ^0.10.1
  json_annotation: ^4.12.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.0
  flutter_gen_runner:

  flutter_lints: ^4.0.0
  json_serializable: ^6.14.0

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/icons/
    - assets/files/Hadeeth/
    - assets/files/quraan/
  fonts:
    - family: "Janna"
      fonts:
        - asset: assets/fonts/Janna LT Bold.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package


flutter_gen:
  output: lib/core/gen/ # Optional (default: lib/gen/)
  # line_length: 80 # Optional

  # Optional
  integrations:
    image: true
    flutter_svg: true



